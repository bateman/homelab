# =============================================================================
# Recyclarr Configuration - Trash Guides Sync
# NAS QNAP TS-435XeU - Homelab
#
# Documentation: https://recyclarr.dev/wiki/yaml/config-reference/
# Trash Guides:  https://trash-guides.info/
#
# INITIAL SETUP:
# 1. Copy this file to ./config/recyclarr/recyclarr.yml
# 2. Get API key from Sonarr: Settings → General → API Key
# 3. Get API key from Radarr: Settings → General → API Key
# 4. Set SONARR_API_KEY and RADARR_API_KEY in docker/.env.secrets
# 5. Restart container to start automatic daily sync (or run: make recyclarr-sync)
#
# API keys are read from environment variables (passed via compose).
# See: https://recyclarr.dev/wiki/yaml/env-vars/
#
# NOTE: Recyclarr only supports Sonarr and Radarr.
#       Other *arr apps (Lidarr, Readarr, etc.) are NOT supported.
#
# QUALITY PROFILES:
#   Profiles are referenced by trash_id - Recyclarr pulls the full
#   profile definition (qualities, custom formats, scores) from Trash
#   Guides automatically. No need to manually specify quality hierarchies.
#
# AVAILABLE COMMANDS:
#   recyclarr list qualities     - Show quality definition types
#   recyclarr list custom-formats - Show available custom formats
#   recyclarr list naming        - Show media naming format keys
# =============================================================================

# =============================================================================
# Sonarr Configuration
# Docs: https://recyclarr.dev/wiki/yaml/config-reference/
# =============================================================================
sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    # Remove custom formats from Sonarr that are no longer in this config
    delete_old_custom_formats: true

    # ---------------------------------------------------------------------------
    # Quality Definition
    # Controls min/max/preferred file sizes per quality level
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/quality-definition/
    # ---------------------------------------------------------------------------
    quality_definition:
      type: series
      # preferred_ratio: 1.0  # 0.0=min, 0.5=mid, 1.0=max (default: guide value)

    # ---------------------------------------------------------------------------
    # Quality Profiles
    # Uses trash_id to pull full profile from Trash Guides automatically
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/quality-profiles/
    # ---------------------------------------------------------------------------
    quality_profiles:
      # WEB-1080p - Recommended for most users
      - trash_id: 72dae194fc92bf828f32cde7744e51a1
        reset_unmatched_scores:
          enabled: true

      # Any - Custom profile limited to 720p-2160p (no SD/480p/BR-DISK)
      - name: Any
        upgrade:
          allowed: true
          until_quality: WEB 2160p
        qualities:
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Remux-2160p
          - name: Bluray-2160p
          - name: HDTV-2160p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Remux-1080p
          - name: Bluray-1080p
          - name: HDTV-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: Bluray-720p
          - name: HDTV-720p

      # Uncomment for additional profiles (find trash_ids via Trash Guides):
      # - trash_id: <WEB-2160p trash_id>
      #   reset_unmatched_scores:
      #     enabled: true

    # ---------------------------------------------------------------------------
    # Custom Formats (Optional Overrides)
    # The quality profile above already includes Trash Guides custom formats.
    # Only add entries here to override scores or add formats not in the profile.
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/custom-formats/
    # ---------------------------------------------------------------------------
    # custom_formats:
    #   # Example: Penalize unwanted formats
    #   - trash_ids:
    #       - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
    #       - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
    #       - e2315f990da2e2cbfc9fa5b7a6c62170  # LQ (Release Title)
    #       - 47435ece6b99a0b477caf360e79ba0bb  # x265 (HD)
    #     assign_scores_to:
    #       - name: WEB-1080p
    #         score: -10000
    #
    #   # Example: Bonus score for streaming services
    #   - trash_ids:
    #       - d660701077794679fd59e8bdf4ce3a29  # AMZN
    #       - f67c9ca88f463a48346062e8ad07713f  # ATVP
    #       - 89358767a60cc28783cdc3d0be9388a4  # DSNP
    #       - 81d1fbf600e2540cee87f3a23f9d3c1c  # MAX
    #       - d34870697c9db575f17700212167be23  # NF
    #     assign_scores_to:
    #       - name: WEB-1080p
    #         score: 100

    # ---------------------------------------------------------------------------
    # Media Naming - Trash Guides recommended (Plex-optimized)
    # Keys listed via: recyclarr list naming sonarr
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/media-naming/
    # ---------------------------------------------------------------------------
    media_naming:
      series: default
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    # ---------------------------------------------------------------------------
    # Media Management
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/media-management/
    # ---------------------------------------------------------------------------
    media_management:
      # Let custom format scores handle propers/repacks (Trash Guides recommendation)
      propers_and_repacks: do_not_prefer

# =============================================================================
# Radarr Configuration
# Docs: https://recyclarr.dev/wiki/yaml/config-reference/
# =============================================================================
radarr:
  movies:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY

    # Remove custom formats from Radarr that are no longer in this config
    delete_old_custom_formats: true

    # ---------------------------------------------------------------------------
    # Quality Definition
    # Controls min/max/preferred file sizes per quality level
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/quality-definition/
    # ---------------------------------------------------------------------------
    quality_definition:
      type: movie
      # preferred_ratio: 1.0  # 0.0=min, 0.5=mid, 1.0=max (default: guide value)

    # ---------------------------------------------------------------------------
    # Quality Profiles
    # Uses trash_id to pull full profile from Trash Guides automatically
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/quality-profiles/
    # ---------------------------------------------------------------------------
    quality_profiles:
      # HD Bluray + WEB (1080p) - Recommended for most users
      - trash_id: d1d67249d3890e49bc12e275d989a7e9
        reset_unmatched_scores:
          enabled: true

      # UHD Bluray + WEB (4K) - 4K with 1080p fallback
      - trash_id: 64fb5f9858489bdac2af690e27c8f42f
        reset_unmatched_scores:
          enabled: true

      # Any - Custom profile limited to 720p-2160p (no SD/480p/BR-DISK)
      - name: Any
        upgrade:
          allowed: true
          until_quality: WEB 2160p
        qualities:
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Remux-2160p
          - name: Bluray-2160p
          - name: HDTV-2160p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Remux-1080p
          - name: Bluray-1080p
          - name: HDTV-1080p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: Bluray-720p
          - name: HDTV-720p

      # Remux + WEB 1080p
      # - trash_id: 9ca12ea80aa55ef916e3751f4b874151
      #   reset_unmatched_scores:
      #     enabled: true
      #
      # Remux + WEB 2160p
      # - trash_id: fd161a61e3ab826d3a22d53f935696dd
      #   reset_unmatched_scores:
      #     enabled: true

    # ---------------------------------------------------------------------------
    # Custom Formats (Optional Overrides)
    # The quality profile above already includes Trash Guides custom formats.
    # Only add entries here to override scores or add formats not in the profile.
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/custom-formats/
    # ---------------------------------------------------------------------------
    # custom_formats:
    #   # Example: Penalize unwanted formats
    #   - trash_ids:
    #       - ed38b889b31be83fda192888e2286d83  # BR-DISK
    #       - 90a6f9a284dff5103f6346090e6280c8  # LQ
    #       - e204b80c87be9497a8a6eaff48f72905  # LQ (Release Title)
    #       - dc98083864ea246d05a42df0d05f81cc  # x265 (HD)
    #       - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
    #     assign_scores_to:
    #       - name: HD Bluray + WEB
    #         score: -10000
    #
    #   # Example: Bonus for HQ release groups
    #   - trash_ids:
    #       - ed27ebfef2f323e964fb1f61f37d2d1f  # Tier 01
    #       - c20c8647f2746a1f4c4262b0fbbeeeae  # Tier 02
    #     assign_scores_to:
    #       - name: HD Bluray + WEB
    #         score: 1750
    #
    #   # Example: Bonus for streaming services
    #   - trash_ids:
    #       - b3b3a6ac74ecbd56bcdbefa4799fb9df  # AMZN
    #       - 40e9380490e748672c2522eaaeb692f7  # ATVP
    #       - 84272245b2988854bfb76a16e60baea5  # DSNP
    #       - 6a061313d22e51e0f25b7cd4dc065233  # MAX
    #       - 170b1d363bd8516fbf3a3eb05d4faff6  # NF
    #     assign_scores_to:
    #       - name: HD Bluray + WEB
    #         score: 100

    # ---------------------------------------------------------------------------
    # Media Naming - Trash Guides recommended (Plex-optimized)
    # Keys listed via: recyclarr list naming radarr
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/media-naming/
    # ---------------------------------------------------------------------------
    media_naming:
      folder: plex-tmdb
      movie:
        rename: true
        standard: plex-tmdb

    # ---------------------------------------------------------------------------
    # Media Management
    # Docs: https://recyclarr.dev/wiki/yaml/config-reference/media-management/
    # ---------------------------------------------------------------------------
    media_management:
      # Let custom format scores handle propers/repacks (Trash Guides recommendation)
      propers_and_repacks: do_not_prefer
