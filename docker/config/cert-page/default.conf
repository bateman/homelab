server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Custom MIME types for this server block. This replaces the global
    # nginx mime.types, but that's fine — cert-page only serves HTML and
    # certificate files. Adding the full mime.types would be unnecessary.
    types {
        text/html                             html;
        text/css                              css;
        application/x-apple-aspen-config      mobileconfig;
        application/x-x509-ca-cert            crt pem;
    }

    # Prevent caching of cert files (they may be regenerated)
    location ~* \.(crt|pem|mobileconfig)$ {
        add_header Cache-Control "no-store, no-cache";
    }
}
