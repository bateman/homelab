# =============================================================================
# Traefik dynamic configuration for Plex (Movies/TV)
# =============================================================================
# Plex (Movies/TV) runs as an LXC container on Proxmox (192.168.3.21).
# This file provides manual routing since it's not a Docker container.
#
# Plex (Music) runs as Docker on NAS — routed via container labels in
# compose.media.yml (plex-music.home.local), no config needed here.
#
# Access: https://plex.home.local
# Requires Pi-hole DNS record: plex.home.local -> 192.168.3.10
#
# NOTE: No Authelia middleware — Plex has its own authentication (Plex account)
# and client apps (iOS, Android, Smart TV) need direct API access.
# =============================================================================

http:
  routers:
    plex:
      rule: "Host(`plex.home.local`)"
      service: plex
      entryPoints:
        - websecure
      tls: {}

  services:
    plex:
      loadBalancer:
        servers:
          - url: "http://192.168.3.21:32400"
