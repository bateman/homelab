# =============================================================================
# Home Assistant - Core Configuration
# =============================================================================
# Managed as part of homelab infrastructure-as-code.
# Changes here require a Home Assistant restart to take effect.
# =============================================================================

homeassistant:
  name: Home
  unit_system: metric

# ---------------------------------------------------------------------------
# Reverse proxy (Traefik)
# ---------------------------------------------------------------------------
# Home Assistant runs with network_mode: host. Traefik (in a Docker bridge
# network) connects to 192.168.3.10:8123, so its source IP is a Docker
# bridge address (172.x.x.x). Without this block HA returns 400 Bad Request.
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.16.0.0/12   # Docker bridge networks (default pool)

# ---------------------------------------------------------------------------
# Integrations
# ---------------------------------------------------------------------------
# Mobile App: required for HA Companion App registration and push
# notifications. Without this, the app returns APIError code 6.
mobile_app:

# Wake-on-LAN: required by plex-minipc-power.yaml automations to send
# magic packets to the Mini PC (Proxmox) when Fire TV turns on.
# See: docs/setup/homeassistant-setup.md
wake_on_lan:

# ---------------------------------------------------------------------------
# REST Commands
# ---------------------------------------------------------------------------
# Proxmox API call used by plex-minipc-power.yaml to gracefully shut down
# the Mini PC when Fire TV goes idle.
# Requires a Proxmox API token — create with:
#   pveum user token add homeassistant@pve hatoken --privsep=0
# Then add to secrets.yaml:
#   proxmox_api_token: PVEAPIToken=homeassistant@pve!hatoken=<token-value>
rest_command:
  proxmox_shutdown_minipc:
    url: "https://192.168.3.20:8006/api2/json/nodes/pve/status"
    method: POST
    headers:
      Authorization: !secret proxmox_api_token
    payload: "command=shutdown"
    verify_ssl: false
    content_type: "application/x-www-form-urlencoded"

# Include automation files from this directory
automation: !include plex-minipc-power.yaml
